<!doctype html>
<html lang="ru" class="dark">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Компас</title>
    <link rel="icon" type="image/x-icon" href="/favicon.ico" sizes="any" />
    <link rel="icon" type="image/svg+xml" href="/icon.svg" />
    <link rel="shortcut icon" href="/favicon.ico" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Noto+Color+Emoji&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body>
    <div class="app">
      <aside class="sidebar">
        <div class="sidebar-header">
          <div class="logo">
            <img class="logo-mark" src="/src/svg/orange/compass-orange-default.svg" alt="Компас" />
            <span class="logo-text">Компас</span>
          </div>
          <button id="open-vault" class="btn-new btn-vault" type="button" title="Сценарии и документы">
            <span class="btn-new-icon" aria-hidden="true">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>
            </span>
            Хранилище
          </button>
          <button id="new-chat" class="btn-new" title="Новый чат">
            <span class="btn-new-icon">+</span>
            Новый чат
          </button>
        </div>
        <div class="sidebar-section">История</div>
        <div id="history" class="history"></div>
        <div class="sidebar-footer">
          <span id="conn-status" class="conn-status">● подключение…</span>
        </div>
      </aside>

      <main class="main">
        <header class="main-header">
          <button id="model-pill" class="model-pill" type="button" title="Настройки модели">
            <span id="provider-name">…</span>
            <span class="model-sep">·</span>
            <span id="model-name">локальная модель</span>
            <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-left:4px"><polyline points="6 9 12 15 18 9"/></svg>
          </button>
          <div id="settings-panel" class="settings-panel hidden">
            <div class="settings-row">
              <label>Провайдер</label>
              <select id="sel-provider"></select>
            </div>
            <div class="settings-row">
              <label>Base URL</label>
              <input id="sel-base" type="text" spellcheck="false" />
            </div>
            <div id="folder-row" class="settings-row hidden">
              <label title="Yandex Cloud folder ID">Folder ID</label>
              <input id="sel-folder" type="text" spellcheck="false" placeholder="b1g..." />
            </div>
            <div class="settings-row">
              <label>API-ключ</label>
              <input id="sel-apikey" type="password" spellcheck="false" autocomplete="off" placeholder="токен провайдера" />
            </div>
            <div class="settings-row">
              <label>Модель</label>
              <div class="model-row">
                <select id="sel-model"></select>
                <button id="refresh-models" class="btn-mini" type="button" title="Обновить">⟳</button>
              </div>
            </div>
            <div class="settings-row">
              <input id="sel-model-custom" type="text" placeholder="или введи имя модели вручную" spellcheck="false" />
            </div>
            <div id="vision-block">
              <div class="settings-row settings-section">
                <label>Vision (картинки, верификация шагов)</label>
              </div>
              <div class="settings-row">
                <label title="Оставь пусто, чтобы использовать основной провайдер.">Провайдер</label>
                <select id="sel-vision-provider"></select>
              </div>
              <div id="vision-base-row" class="settings-row hidden">
                <label>Base URL</label>
                <input id="sel-vision-base" type="text" spellcheck="false" />
              </div>
              <div id="vision-apikey-row" class="settings-row hidden">
                <label>API-ключ</label>
                <input id="sel-vision-apikey" type="password" spellcheck="false" autocomplete="off" placeholder="токен провайдера" />
              </div>
              <div class="settings-row">
                <label>Модель</label>
                <div class="model-row">
                  <select id="sel-vision-model"></select>
                  <button id="refresh-vision-models" class="btn-mini" type="button" title="Обновить">⟳</button>
                </div>
              </div>
              <div class="settings-row">
                <input id="sel-vision-model-custom" type="text" placeholder="или введи vision-модель вручную" spellcheck="false" />
              </div>
            </div>
            <div class="settings-actions">
              <button id="settings-save" class="btn-primary" type="button">Применить</button>
              <button id="settings-cancel" class="btn-ghost" type="button">Отмена</button>
            </div>
          </div>
        </header>

        <div id="messages" class="messages">
          <div class="welcome">
            <img class="welcome-mark" src="/src/svg/orange/compass-orange-default.svg" alt="" />
            <h1>Чем могу помочь?</h1>
            <p>Открою приложение, найду файл, что-то в интернете или управлю браузером.</p>
          </div>
        </div>

        <div class="composer-wrap">
          <div id="status-bar" class="status-bar hidden">
            <img class="spinner" src="/src/svg/compass-spin.svg" alt="" width="16" height="16" />
            <span id="status-text">Думаю…</span>
          </div>
          <form id="composer" class="composer">
            <button id="attach-btn" class="attach" type="button" title="Прикрепить изображение">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21.44 11.05l-9.19 9.19a6 6 0 1 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 1 1-2.83-2.83l8.49-8.48"/></svg>
            </button>
            <input id="file-input" type="file" accept="image/*,.pdf,.doc,.docx,.xls,.xlsx,.ppt,.pptx,.odt,.ods,.odp,.rtf,.txt,.md,.csv,.tsv,.json,.xml,.yaml,.yml,.html,.htm,.log" multiple hidden />
            <div class="composer-center">
              <div id="quote-chip" class="quote-chip hidden">
                <div class="quote-chip-body">
                  <div class="quote-chip-label">Цитата</div>
                  <div id="quote-chip-text" class="quote-chip-text"></div>
                </div>
                <button id="quote-chip-rm" type="button" class="quote-chip-rm" title="Убрать цитату">×</button>
              </div>
              <div id="attach-preview" class="attach-preview"></div>
              <textarea
                id="input"
                class="input"
                rows="1"
                placeholder="Напиши сообщение…"
                autofocus
              ></textarea>
            </div>
            <button id="send" class="send" type="submit" title="Отправить">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="19" x2="12" y2="5"/><polyline points="5 12 12 5 19 12"/></svg>
            </button>
          </form>
          <div class="hint">Enter — отправить, Shift+Enter — перенос строки</div>
        </div>
      </main>
    </div>

    <div id="vault-modal" class="vault-modal hidden" role="dialog" aria-modal="true">
      <div class="vault-backdrop" data-close></div>
      <div class="vault-panel">
        <header class="vault-header">
          <div class="vault-tabs">
            <button type="button" class="vault-tab active" data-tab="scenarios">Сценарии</button>
            <button type="button" class="vault-tab" data-tab="documents">Документы</button>
          </div>
          <button type="button" class="vault-close" data-close title="Закрыть">×</button>
        </header>

        <section class="vault-body" data-pane="scenarios">
          <div class="vault-list-col">
            <div class="vault-toolbar">
              <button id="scn-new" class="btn-primary" type="button">+ Новый</button>
            </div>
            <div id="scn-list" class="vault-list"></div>
          </div>
          <div class="vault-edit-col">
            <form id="scn-form" class="vault-form">
              <label>Название
                <input id="scn-name" type="text" required maxlength="80" placeholder="утренний режим" />
              </label>
              <label>Триггеры (через запятую)
                <input id="scn-triggers" type="text" placeholder="доброе утро, начни день" />
              </label>
              <label>Теги (через запятую)
                <input id="scn-tags" type="text" placeholder="scenario, morning" />
              </label>
              <label>Шаги на естественном языке
                <textarea id="scn-body" rows="10" required placeholder="1. Открой Chrome на gmail.com&#10;2. Открой Telegram&#10;3. Поставь громкость 30%"></textarea>
              </label>
              <div class="vault-actions">
                <button type="submit" class="btn-primary">Сохранить</button>
                <button type="button" id="scn-delete" class="btn-danger hidden">Удалить</button>
                <span id="scn-status" class="vault-status"></span>
              </div>
            </form>
          </div>
        </section>

        <section class="vault-body hidden" data-pane="documents">
          <div class="vault-list-col">
            <div class="vault-toolbar">
              <label class="btn-primary vault-upload-btn">
                + Загрузить
                <input id="doc-upload" type="file" multiple hidden
                       accept=".pdf,.doc,.docx,.xls,.xlsx,.ppt,.pptx,.odt,.ods,.odp,.rtf,.txt,.md,.csv,.tsv,.json,.xml,.yaml,.yml,.html,.htm,.log" />
              </label>
              <span id="doc-upload-status" class="vault-status"></span>
            </div>
            <div id="doc-list" class="vault-list"></div>
          </div>
          <div class="vault-edit-col">
            <div id="doc-detail" class="vault-doc-detail">
              <p class="vault-empty">Выбери документ слева, чтобы посмотреть извлечённый текст.</p>
            </div>
          </div>
        </section>
      </div>
    </div>

    <div id="ctx-menu" class="ctx-menu hidden" role="menu">
      <button type="button" class="ctx-item" data-action="copy">Копировать</button>
      <button type="button" class="ctx-item" data-action="reply">Ответить на фрагмент</button>
    </div>
    <script src="/app.js"></script>
    <script src="/vault.js"></script>
    <script>
      // Подгружаем мост для browser_* инструментов, только если запрошено (?bridge=1).
      if (new URLSearchParams(location.search).get("bridge") === "1") {
        const s = document.createElement("script");
        s.src = "/bridge.js";
        document.body.appendChild(s);
      }
    </script>
  </body>
</html>
