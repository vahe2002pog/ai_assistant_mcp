<!doctype html>
<html lang="ru" class="dark">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Компас</title>
    <link rel="icon" type="image/x-icon" href="/favicon.ico" sizes="any" />
    <link rel="icon" type="image/svg+xml" href="/icon.svg" />
    <link rel="shortcut icon" href="/favicon.ico" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body>
    <div class="app">
      <aside class="sidebar">
        <div class="sidebar-header">
          <div class="logo">
            <img class="logo-mark" src="/src/svg/orange/compass-orange-default.svg" alt="Компас" />
            <span class="logo-text">Компас</span>
          </div>
          <button id="new-chat" class="btn-new" title="Новый чат">
            <span class="btn-new-icon">+</span>
            Новый чат
          </button>
        </div>
        <div class="sidebar-section">История</div>
        <div id="history" class="history"></div>
        <div class="sidebar-footer">
          <span id="conn-status" class="conn-status">● подключение…</span>
        </div>
      </aside>

      <main class="main">
        <header class="main-header">
          <button id="model-pill" class="model-pill" type="button" title="Настройки модели">
            <span id="provider-name">…</span>
            <span class="model-sep">·</span>
            <span id="model-name">локальная модель</span>
            <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-left:4px"><polyline points="6 9 12 15 18 9"/></svg>
          </button>
          <div id="settings-panel" class="settings-panel hidden">
            <div class="settings-row">
              <label>Провайдер</label>
              <select id="sel-provider"></select>
            </div>
            <div class="settings-row">
              <label>Base URL</label>
              <input id="sel-base" type="text" spellcheck="false" />
            </div>
            <div class="settings-row">
              <label>Модель</label>
              <div class="model-row">
                <select id="sel-model"></select>
                <button id="refresh-models" class="btn-mini" type="button" title="Обновить">⟳</button>
              </div>
            </div>
            <div class="settings-row">
              <input id="sel-model-custom" type="text" placeholder="или введи имя модели вручную" spellcheck="false" />
            </div>
            <div class="settings-actions">
              <button id="settings-save" class="btn-primary" type="button">Применить</button>
              <button id="settings-cancel" class="btn-ghost" type="button">Отмена</button>
            </div>
          </div>
        </header>

        <div id="messages" class="messages">
          <div class="welcome">
            <img class="welcome-mark" src="/src/svg/orange/compass-orange-default.svg" alt="" />
            <h1>Чем могу помочь?</h1>
            <p>Открою приложение, найду файл, что-то в интернете или управлю браузером.</p>
          </div>
        </div>

        <div class="composer-wrap">
          <div id="status-bar" class="status-bar hidden">
            <img class="spinner" src="/src/svg/compass-spin.svg" alt="" width="16" height="16" />
            <span id="status-text">Думаю…</span>
          </div>
          <form id="composer" class="composer">
            <button id="attach-btn" class="attach" type="button" title="Прикрепить изображение">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21.44 11.05l-9.19 9.19a6 6 0 1 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 1 1-2.83-2.83l8.49-8.48"/></svg>
            </button>
            <input id="file-input" type="file" accept="image/*" multiple hidden />
            <div class="composer-center">
              <div id="attach-preview" class="attach-preview"></div>
              <textarea
                id="input"
                class="input"
                rows="1"
                placeholder="Напиши сообщение…"
                autofocus
              ></textarea>
            </div>
            <button id="send" class="send" type="submit" title="Отправить">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="19" x2="12" y2="5"/><polyline points="5 12 12 5 19 12"/></svg>
            </button>
          </form>
          <div class="hint">Enter — отправить, Shift+Enter — перенос строки</div>
        </div>
      </main>
    </div>

    <div id="ctx-menu" class="ctx-menu hidden" role="menu">
      <button type="button" class="ctx-item" data-action="copy">Копировать</button>
      <button type="button" class="ctx-item" data-action="reply">Ответить на фрагмент</button>
    </div>
    <script src="/app.js"></script>
    <script>
      // Подгружаем мост для browser_* инструментов, только если запрошено (?bridge=1).
      if (new URLSearchParams(location.search).get("bridge") === "1") {
        const s = document.createElement("script");
        s.src = "/bridge.js";
        document.body.appendChild(s);
      }
    </script>
  </body>
</html>
