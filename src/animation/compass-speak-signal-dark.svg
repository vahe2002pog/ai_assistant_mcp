<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 170 170" role="img" aria-label="Compass voice assistant speak signal dark">
  <style>
    :root {
      --main: #ffffff;
      --cut: #101010;
      --accent: #ff6a1a;
    }

    .voice-ring {
      fill: none;
      stroke: var(--accent);
      stroke-width: 2;
      opacity: 0;
      filter: drop-shadow(0 0 10px rgba(255, 106, 26, .45));
      transform-box: fill-box;
      transform-origin: center;
      animation: voiceRing 1.15s ease-out infinite;
    }

    .voice-ring-2 { animation-delay: 220ms; }
    .voice-ring-3 { animation-delay: 440ms; }

    .part-ring {
      fill: none;
      stroke: var(--main);
      stroke-width: 4.5;
      stroke-linecap: round;
      transform-box: fill-box;
      transform-origin: center;
      animation: ringTalk 620ms ease-in-out infinite;
    }

    .part-arrow,
    .part-arrow * {
      animation: none !important;
      transform: none !important;
    }

    .part-needle { fill: var(--main); }
    .part-accent,
    .part-core,
    .part-star {
      fill: var(--accent);
      filter: drop-shadow(0 0 10px rgba(255, 106, 26, .45));
    }
    .part-star-cut { fill: var(--cut); }

    .part-star-group {
      transform-box: fill-box;
      transform-origin: center;
      animation: starTalk 620ms ease-in-out infinite;
    }

    @keyframes voiceRing {
      0% { opacity: .75; transform: scale(.64); }
      100% { opacity: 0; transform: scale(1.36); }
    }

    @keyframes ringTalk {
      0%, 100% { transform: translateX(0) scale(1); stroke-width: 4.5; }
      25% { transform: translateX(-1px) scale(1.04); stroke-width: 5.4; }
      50% { transform: translateX(1px) scale(.99); stroke-width: 4.1; }
      75% { transform: translateX(-1px) scale(1.025); stroke-width: 5; }
    }

    @keyframes starTalk {
      0%, 100% { transform: translateY(0) rotate(0deg) scale(1); }
      25% { transform: translateY(-3px) rotate(15deg) scale(1.12); }
      50% { transform: translateY(1px) rotate(-10deg) scale(.96); }
      75% { transform: translateY(-2px) rotate(8deg) scale(1.08); }
    }
  </style>

  <circle class="voice-ring voice-ring-1" cx="85" cy="85" r="47"/>
  <circle class="voice-ring voice-ring-2" cx="85" cy="85" r="47"/>
  <circle class="voice-ring voice-ring-3" cx="85" cy="85" r="47"/>
  <g transform="translate(35 29)">
    <circle class="part-ring" cx="50" cy="56" r="28"/>
    <g class="part-arrow">
      <polygon class="part-needle" points="50,32 62,56 50,80 38,56"/>
      <polygon class="part-accent" points="50,32 62,56 50,56"/>
      <circle class="part-core" cx="50" cy="56" r="3.2"/>
    </g>
    <g class="part-star-anchor" transform="translate(50 14)">
      <g class="part-star-group">
        <path class="part-star" d="M 0 -11 L 3 -3 L 11 0 L 3 3 L 0 11 L -3 3 L -11 0 L -3 -3 Z"/>
        <circle class="part-star-cut" cx="0" cy="0" r="2"/>
      </g>
    </g>
  </g>
</svg>
