<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 170 170" role="img" aria-label="Compass voice assistant wake pulse light">
  <style>
    :root {
      --main: #0a0a0a;
      --cut: #0a0a0a;
      --accent: #ff6a1a;
    }

    .halo {
      fill: none;
      stroke: var(--accent);
      stroke-width: 2;
      transform-box: fill-box;
      transform-origin: center;
      animation: halo 1.55s ease-out infinite;
    }

    .part-ring {
      fill: none;
      stroke: var(--main);
      stroke-width: 4.5;
      stroke-linecap: round;
      transform-box: fill-box;
      transform-origin: center;
      animation: ringWake 1.55s ease-in-out infinite;
    }

    .part-arrow,
    .part-arrow * {
      animation: none !important;
      transform: none !important;
    }

    .part-needle { fill: var(--main); }
    .part-accent,
    .part-core,
    .part-star { fill: var(--accent); }
    .part-star-cut { fill: var(--cut); }

    .part-star-group {
      transform-box: fill-box;
      transform-origin: center;
      animation: starWake 1.55s ease-in-out infinite;
    }

    @keyframes halo {
      0% { opacity: 0; transform: scale(.76); }
      18% { opacity: .7; }
      100% { opacity: 0; transform: scale(1.38); }
    }

    @keyframes ringWake {
      0%, 100% { transform: scale(1); stroke-width: 4.5; }
      48% { transform: scale(1.035); stroke-width: 5.2; }
    }

    @keyframes starWake {
      0%, 100% { transform: translateY(0) scale(1) rotate(0deg); }
      45% { transform: translateY(-4px) scale(1.18) rotate(22deg); }
    }
  </style>

  <circle class="halo" cx="85" cy="85" r="41"/>
  <g transform="translate(35 29)">
    <circle class="part-ring" cx="50" cy="56" r="28"/>
    <g class="part-arrow">
      <polygon class="part-needle" points="50,32 62,56 50,80 38,56"/>
      <polygon class="part-accent" points="50,32 62,56 50,56"/>
      <circle class="part-core" cx="50" cy="56" r="3.2"/>
    </g>
    <g class="part-star-anchor" transform="translate(50 14)">
      <g class="part-star-group">
        <path class="part-star" d="M 0 -11 L 3 -3 L 11 0 L 3 3 L 0 11 L -3 3 L -11 0 L -3 -3 Z"/>
        <circle class="part-star-cut" cx="0" cy="0" r="2"/>
      </g>
    </g>
  </g>
</svg>
