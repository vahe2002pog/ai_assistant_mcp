<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 170 170" role="img" aria-label="Compass voice assistant think signal light">
  <style>
    :root {
      --main: #0a0a0a;
      --cut: #0a0a0a;
      --accent: #ff6a1a;
    }

    .dots {
      transform-box: fill-box;
      transform-origin: center;
      animation: orbit 1.9s linear infinite;
    }

    .dot {
      fill: var(--accent);
      opacity: .85;
      transform-box: fill-box;
      transform-origin: center;
      animation: dotPulse 950ms ease-in-out infinite;
    }

    .dot-2 { animation-delay: 150ms; }
    .dot-3 { animation-delay: 300ms; }

    .part-ring {
      fill: none;
      stroke: var(--main);
      stroke-width: 4.5;
      stroke-linecap: round;
      transform-box: fill-box;
      transform-origin: center;
      animation: ringScan 1.9s linear infinite;
    }

    .part-arrow,
    .part-arrow * {
      animation: none !important;
      transform: none !important;
    }

    .part-needle { fill: var(--main); }
    .part-accent,
    .part-core,
    .part-star { fill: var(--accent); }
    .part-star-cut { fill: var(--cut); }

    .part-star-group {
      transform-box: fill-box;
      transform-origin: center;
      animation: starSearch 1.9s ease-in-out infinite;
    }

    @keyframes orbit { to { transform: rotate(360deg); } }

    @keyframes dotPulse {
      0%, 100% { transform: scale(.65); opacity: .35; }
      50% { transform: scale(1.15); opacity: 1; }
    }

    @keyframes ringScan {
      0% { transform: rotate(0deg); stroke-dasharray: 42 134; stroke-dashoffset: 0; }
      100% { transform: rotate(360deg); stroke-dasharray: 42 134; stroke-dashoffset: -176; }
    }

    @keyframes starSearch {
      0%, 100% { transform: translateY(2px) scale(.86) rotate(-20deg); }
      50% { transform: translateY(-4px) scale(1.12) rotate(25deg); }
    }
  </style>

  <g class="dots">
    <circle class="dot dot-1" cx="85" cy="25" r="4.5"/>
    <circle class="dot dot-2" cx="124" cy="57" r="4.5"/>
    <circle class="dot dot-3" cx="53" cy="126" r="4.5"/>
  </g>
  <g transform="translate(35 29)">
    <circle class="part-ring" cx="50" cy="56" r="28"/>
    <g class="part-arrow">
      <polygon class="part-needle" points="50,32 62,56 50,80 38,56"/>
      <polygon class="part-accent" points="50,32 62,56 50,56"/>
      <circle class="part-core" cx="50" cy="56" r="3.2"/>
    </g>
    <g class="part-star-anchor" transform="translate(50 14)">
      <g class="part-star-group">
        <path class="part-star" d="M 0 -11 L 3 -3 L 11 0 L 3 3 L 0 11 L -3 3 L -11 0 L -3 -3 Z"/>
        <circle class="part-star-cut" cx="0" cy="0" r="2"/>
      </g>
    </g>
  </g>
</svg>
